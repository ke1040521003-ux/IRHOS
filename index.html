<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IRHOS 과학동아리</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f6f8fb;
color:#111;
}

header{
background:#1d3557;
color:white;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
margin:0;
font-size:22px;
}

nav{
background:white;
border-bottom:1px solid #ddd;
padding:10px;
text-align:center;
}

nav button{
margin:5px;
padding:8px 16px;
border:none;
background:#1d3557;
color:white;
border-radius:8px;
cursor:pointer;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.hidden{
display:none;
}

.post{
border-top:1px solid #ddd;
padding:15px 0;
}

.tag{
display:inline-block;
background:#e3e9f2;
padding:4px 8px;
margin-right:5px;
border-radius:5px;
font-size:12px;
}

textarea,input,select{
width:100%;
margin:5px 0;
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

button.small{
padding:4px 10px;
font-size:12px;
}

/* 슬라이드 */

.slider{
position:relative;
height:300px;
overflow:hidden;
border-radius:10px;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:opacity 1s;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

.slide.active{
opacity:1;
}

</style>
</head>


<body>


<header>

<h1>🔬 IRHOS 과학동아리</h1>

<button onclick="toggleLogin()">로그인</button>

</header>


<nav>

<button onclick="showSection('home')">홈</button>
<button onclick="showSection('notice')">공지</button>
<button onclick="showSection('archive')">탐구 아카이브</button>
<button onclick="showSection('write')">탐구 작성</button>

</nav>


<div class="container">

<!-- 홈 -->

<div id="home" class="card">

<div class="slider">

<div class="slide active"><img src="slide1.jpg"></div>
<div class="slide"><img src="slide2.jpg"></div>
<div class="slide"><img src="slide3.jpg"></div>

</div>

<h2>IRHOS 과학동아리</h2>

<p>
IRHOS 과학동아리는 탐구 기반 실험과 연구 기록을 통해
과학적 사고를 확장하는 학생 연구 동아리입니다.
</p>

<p>
본 사이트는 실험 기록, 장기 연구 프로젝트,
공지 및 탐구 아카이브를 관리하기 위해 제작되었습니다.
</p>

<h3>📢 최근 공지</h3>

<div id="noticePreview"></div>

<h3>🧪 최근 탐구</h3>

<div id="recentResearch"></div>

</div>



<!-- 공지 -->

<div id="notice" class="card hidden">

<h2>공지</h2>

<div id="noticeList"></div>

<div id="noticeWrite" class="hidden">

<h3>공지 작성</h3>

<input id="noticeTitle" placeholder="제목">

<textarea id="noticeContent"></textarea>

<button onclick="saveNotice()">작성</button>

</div>

</div>



<!-- 아카이브 -->

<div id="archive" class="card hidden">

<h2>탐구 아카이브</h2>

<input id="searchInput" placeholder="검색" onkeyup="searchResearch()">

<div id="researchList"></div>

</div>



<!-- 작성 -->

<div id="write" class="card hidden">

<h2>탐구 작성</h2>

<select id="researchType" onchange="changeForm()">

<option value="experiment">실험 보고서</option>
<option value="project">장기 프로젝트</option>

</select>

<select id="researchClub">

<option value="전체">전체</option>
<option>융합과학탐구1</option>
<option>융합과학탐구2</option>
<option>생명과학</option>
<option>지구과학</option>

</select>

<input id="title" placeholder="제목">

<input id="tags" placeholder="#화학 #생명과학">

<div id="experimentForm">

<textarea id="reason" placeholder="실험 이유"></textarea>
<textarea id="prediction" placeholder="결과 예측"></textarea>
<textarea id="method" placeholder="실험 과정"></textarea>
<textarea id="result" placeholder="실험 결과"></textarea>

</div>

<div id="projectForm" class="hidden">

<textarea id="intro" placeholder="서론"></textarea>
<textarea id="body" placeholder="본론"></textarea>
<textarea id="conclusion" placeholder="결론"></textarea>

</div>

<button onclick="saveResearch()">저장</button>

</div>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {

apiKey:"AIzaSyDXVVSPhvErz9JfjXKjMaZIBNYu6d3j8dg",

authDomain:"irhos-science-lab.firebaseapp.com",

projectId:"irhos-science-lab",

};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);



function getUser(){

return JSON.parse(localStorage.getItem("user")||"null")

}



window.toggleLogin=function(){

let id=prompt("학번")

let name=prompt("이름")

let club=prompt("동아리명")

localStorage.setItem("user",JSON.stringify({id,name,club}))

alert("로그인 성공")

}



window.showSection=function(id){

["home","notice","archive","write"].forEach(s=>{

document.getElementById(s).classList.add("hidden")

})

document.getElementById(id).classList.remove("hidden")

}



window.changeForm=function(){

let type=document.getElementById("researchType").value

document.getElementById("experimentForm").style.display=
type==="experiment"?"block":"none"

document.getElementById("projectForm").style.display=
type==="project"?"block":"none"

}



window.saveResearch=async function(){

let title=title.value
let tags=tags.value.split(" ")

await addDoc(collection(db,"research"),{

title,
tags,
author:getUser().name,
club:researchClub.value,
views:0,
viewUsers:[],
createdAt:new Date().toISOString()

})

alert("저장 완료")

loadResearch()

}



async function loadResearch(){

let list=document.getElementById("researchList")

list.innerHTML=""

let snap=await getDocs(collection(db,"research"))

snap.forEach(docu=>{

let d=docu.data()

list.innerHTML+=`

<div class="post">

<h3>${d.title}</h3>

<p>${d.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</p>

<p>조회수 ${d.views}</p>

<p>조회자 ${d.viewUsers.join(",")}</p>

</div>

`

})

}



window.searchResearch=function(){

let k=document.getElementById("searchInput").value.toLowerCase()

let posts=document.querySelectorAll(".post")

posts.forEach(p=>{

p.style.display=p.innerText.toLowerCase().includes(k)
?"block":"none"

})

}



async function saveNotice(){

await addDoc(collection(db,"notice"),{

title:noticeTitle.value,
content:noticeContent.value,
date:new Date().toISOString()

})

alert("공지 등록")

}



loadResearch()

showSection("home")



/* 슬라이드 */

let slides=document.querySelectorAll(".slide")

let index=0

setInterval(()=>{

slides[index].classList.remove("active")

index=(index+1)%slides.length

slides[index].classList.add("active")

},4000)

</script>

</body>
</html>
