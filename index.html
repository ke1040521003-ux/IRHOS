<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>탐구 아카이브</title>

<style>

body{
margin:0;
font-family:"Noto Sans KR",sans-serif;
background:#f4fbff;
color:#222;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* 로그인 */

#loginBox{
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
text-align:center;
width:90%;
max-width:350px;
}

input, textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
background:#7fd3ff;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:5px;
}

button:hover{
background:#5fc4ff;
}

/* 홈페이지 */

#mainPage{
display:none;
width:100%;
height:100vh;
flex-direction:column;
}

header{
background:#000;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

nav{
background:#eaf7ff;
padding:10px;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

nav a{
text-decoration:none;
color:#000;
font-weight:bold;
}

.container{
padding:20px;
text-align:center;
overflow:auto;
}

.card{
background:white;
padding:20px;
margin:15px auto;
border-radius:12px;
max-width:600px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* 게시글 */

.post{
border:1px solid #ddd;
padding:10px;
margin-top:10px;
border-radius:8px;
text-align:left;
}

@media (max-width:600px){
header{font-size:18px;}
}

</style>
</head>


<body>

<!-- 로그인 -->

<div id="loginBox">

<h2>🔬 탐구 아카이브 로그인</h2>

<input type="text" id="id" placeholder="아이디">

<input type="password" id="pw" placeholder="비밀번호">

<button onclick="login()">로그인</button>

<p id="error" style="color:red;"></p>

</div>



<!-- 메인 -->

<div id="mainPage">

<header>🔬 탐구 아카이브</header>

<nav>
<a href="#">🏠 홈</a>
<a href="#archive">📂 탐구 아카이브</a>
<a href="#members">👨‍🔬 동아리 부원 목록</a>
</nav>

<div class="container">

<div class="card">
<h3>🔎 동아리 소개</h3>
<p>과학 탐구 활동을 기록하고 공유하는 공간입니다.</p>
</div>


<!-- 탐구 업로드 -->

<div class="card" id="archive">

<h3>📂 탐구 자료 업로드</h3>

<input id="title" placeholder="탐구 제목">

<textarea id="content" rows="5" placeholder="탐구 내용을 작성하세요"></textarea>

<button onclick="addPost()">업로드</button>

<div id="postList"></div>

</div>



<!-- 부원 -->

<div class="card" id="members">

<h3>👨‍🔬 동아리 부원 목록</h3>

<p>
부장 : 김가은<br>
지도교사 : 구자형
</p>

</div>

</div>

</div>



<script>

/* 로그인 */

const users = {
"20602 김가은":"science20602",
"00000 구자형":"teacher00000"
};

function login(){

const id=document.getElementById("id").value;
const pw=document.getElementById("pw").value;

if(users[id] && users[id]===pw){

document.getElementById("loginBox").style.display="none";
document.getElementById("mainPage").style.display="flex";

loadPosts();

}else{

document.getElementById("error").innerText="아이디 또는 비밀번호 오류";

}

}


/* 게시글 저장 */

function addPost(){

const title=document.getElementById("title").value;
const content=document.getElementById("content").value;

let posts=JSON.parse(localStorage.getItem("posts"))||[];

posts.push({title,content});

localStorage.setItem("posts",JSON.stringify(posts));

document.getElementById("title").value="";
document.getElementById("content").value="";

loadPosts();

}


/* 게시글 불러오기 */

function loadPosts(){

let posts=JSON.parse(localStorage.getItem("posts"))||[];

let list=document.getElementById("postList");

list.innerHTML="";

posts.forEach((p,index)=>{

list.innerHTML+=`
<div class="post">
<b>${p.title}</b>
<p>${p.content}</p>

<button onclick="editPost(${index})">수정</button>
<button onclick="deletePost(${index})">삭제</button>
</div>
`;

});

}


/* 수정 */

function editPost(i){

let posts=JSON.parse(localStorage.getItem("posts"));

let newTitle=prompt("제목 수정",posts[i].title);
let newContent=prompt("내용 수정",posts[i].content);

if(newTitle && newContent){

posts[i].title=newTitle;
posts[i].content=newContent;

localStorage.setItem("posts",JSON.stringify(posts));

loadPosts();

}

}


/* 삭제 */

function deletePost(i){

let posts=JSON.parse(localStorage.getItem("posts"));

posts.splice(i,1);

localStorage.setItem("posts",JSON.stringify(posts));

loadPosts();

}

</script>

</body>
</html>
