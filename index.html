<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRHOS 과학동아리</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;font-family:Arial,sans-serif;background:#f6f8fb;color:#111;}
    button,input,textarea,select{font:inherit;}
    a{color:#1d4ed8;text-decoration:none;}
    a:hover{text-decoration:underline;}
    .hidden{display:none !important;}
    .app{min-height:100vh;}
    .topbar{width:100%;background:#1d3557;color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:100;transition:all .38s ease;}
    .topbar.shrink{padding:8px 14px;gap:10px;}
    .brand{min-width:180px;transition:all .38s ease;overflow:hidden;}
    .brand h1{margin:0 0 4px 0;font-size:18px;transition:all .38s ease;white-space:nowrap;}
    .brand p{margin:0;font-size:11px;opacity:.8;line-height:1.35;transition:all .38s ease;}
    .topbar.shrink .brand h1{font-size:16px;margin:0;}
    .topbar.shrink .brand p{opacity:0;max-height:0;transform:translateY(-8px);margin:0;overflow:hidden;}
    .side-nav{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;flex:1;align-items:stretch;transition:all .38s ease;}
    .side-nav button{border:none;background:rgba(255,255,255,0.08);color:#fff;padding:8px 10px;border-radius:12px;text-align:center;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-weight:600;min-height:58px;transition:all .38s ease;}
    .side-nav button.active,.side-nav button:hover{background:rgba(255,255,255,0.18);}
    .topbar.shrink .side-nav{gap:6px;}
    .topbar.shrink .side-nav button{min-height:34px;padding:4px;border-radius:10px;}
    .nav-icon{width:24px;height:24px;border-radius:8px;background:rgba(255,255,255,0.14);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:all .38s ease;}
    .topbar.shrink .nav-icon{width:18px;height:18px;font-size:10px;border-radius:6px;}
    .nav-text{display:flex;flex-direction:column;align-items:center;line-height:1.1;font-size:12px;transition:all .38s ease;overflow:hidden;}
    .nav-text small{font-size:9px;opacity:.78;font-weight:400;transition:all .38s ease;}
    .topbar.shrink .nav-text{opacity:0;max-height:0;transform:translateY(-6px);pointer-events:none;}
    .profile-wrap{position:relative;min-width:170px;transition:all .38s ease;}
    .profile-summary{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 10px;background:rgba(255,255,255,0.1);border-radius:12px;cursor:pointer;transition:all .38s ease,opacity .3s ease,transform .3s ease;}
    .profile-left{display:flex;align-items:center;gap:8px;min-width:0;}
    .profile-avatar{width:32px;height:32px;border-radius:50%;background:#dfe7f3;color:#1d3557;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-size:13px;transition:all .38s ease;}
    .profile-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .profile-role{font-size:10px;opacity:.82;}
    .topbar.shrink .profile-wrap{min-width:0;width:0;overflow:hidden;}
    .topbar.shrink .profile-summary{opacity:0;transform:translateY(-10px);pointer-events:none;width:0;min-width:0;padding:0;margin:0;overflow:hidden;}
    .profile-menu{position:absolute;right:0;min-width:190px;top:46px;background:#fff;color:#111;border-radius:14px;box-shadow:0 12px 28px rgba(0,0,0,0.18);padding:8px;display:none;z-index:30;}
    .profile-menu.open{display:block;}
    .profile-menu button{width:100%;border:none;background:#fff;padding:10px 12px;border-radius:10px;text-align:left;cursor:pointer;}
    .profile-menu button:hover{background:#f3f6fb;}
    .main{padding:20px;min-width:0;}
    .page{display:none;}
    .page.active{display:block;}
    .card{background:#fff;border-radius:18px;box-shadow:0 4px 14px rgba(0,0,0,0.08);padding:20px;margin-bottom:20px;}
    .row{display:flex;gap:16px;flex-wrap:wrap;}
    .col{flex:1 1 320px;min-width:0;}
    .tool-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px;}
    input,textarea,select{width:100%;border:1px solid #d0d5dd;border-radius:10px;padding:10px 12px;background:#fff;}
    textarea{min-height:110px;resize:vertical;}
    .primary-btn{border:none;background:#1d3557;color:#fff;padding:10px 16px;border-radius:10px;cursor:pointer;}
    .secondary-btn{border:none;background:#e7edf6;color:#1d3557;padding:10px 16px;border-radius:10px;cursor:pointer;}
    .danger-btn{border:none;background:#b42318;color:#fff;padding:8px 12px;border-radius:10px;cursor:pointer;}
    .small{padding:8px 10px;font-size:13px;}
    .meta{color:#667085;font-size:13px;margin:8px 0;line-height:1.5;}
    .inline-info{color:#667085;font-size:14px;margin-bottom:10px;}
    .hero-slider,.intro-slider{position:relative;width:100%;height:420px;overflow:hidden;border-radius:18px;background:#dfe7f3;}
    .hero-slide,.intro-slide{position:absolute;inset:0;opacity:0;transition:opacity .8s ease;pointer-events:none;}
    .hero-slide.active,.intro-slide.active{opacity:1;pointer-events:auto;}
    .hero-slide img,.intro-slide img{width:100%;height:100%;object-fit:cover;display:block;}
    .hero-overlay{position:absolute;inset:0;background:linear-gradient(to top, rgba(0,0,0,.62), rgba(0,0,0,.18));}
    .hero-text{position:absolute;left:32px;bottom:32px;color:#fff;z-index:2;max-width:680px;}
    .hero-text h2{margin:0 0 10px 0;font-size:36px;line-height:1.2;}
    .hero-text p{margin:0;font-size:16px;line-height:1.6;}
    .slider-nav{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border:none;border-radius:50%;background:rgba(255,255,255,.76);color:#1d3557;font-size:20px;cursor:pointer;z-index:3;}
    .slider-nav.prev{left:14px;}.slider-nav.next{right:14px;}
    .slider-dots{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:3;}
    .slider-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.55);cursor:pointer;}
    .slider-dot.active{background:#fff;}
    .home-intro-box{background:#f8fafc;border:1px solid #e5e7eb;border-radius:14px;padding:18px;margin-top:18px;}
    .dictionary-box,.today-photo-box{border-radius:16px;padding:22px;color:#fff;min-height:180px;}
    .dictionary-box{background:linear-gradient(135deg,#1d3557,#457b9d);}
    .today-photo-box{background:#1f2937;position:relative;overflow:hidden;}
    .today-photo-box img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.4;}
    .today-photo-content{position:relative;z-index:1;}
    .section-label{font-size:12px;opacity:.9;letter-spacing:.08em;margin-bottom:10px;}
    .big-title{font-size:28px;font-weight:700;margin-bottom:10px;}
    .thumb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
    .thumb-card{border:1px solid #e5e7eb;border-radius:16px;overflow:hidden;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.05);cursor:pointer;}
    .thumb-image-wrap{width:100%;height:180px;background:#eef2f7;display:flex;align-items:center;justify-content:center;overflow:hidden;}
    .thumb-image-wrap img{width:100%;height:100%;object-fit:cover;}
    .thumb-image-fallback{color:#667085;font-size:14px;}
    .thumb-content{padding:14px;}
    .thumb-title{font-size:17px;font-weight:700;line-height:1.4;margin-bottom:8px;}
    .thumb-summary{color:#475467;font-size:14px;line-height:1.5;min-height:42px;}
    .notice-badge,.type-badge,.status-badge,.pinned-badge,.year-badge{display:inline-block;padding:4px 8px;border-radius:8px;font-size:12px;margin-right:6px;margin-bottom:8px;}
    .notice-badge{background:#fff3cd;color:#7a5b00;}
    .type-badge{background:#eef2ff;color:#344054;}
    .status-badge{background:#ecfdf3;color:#027a48;}
    .pinned-badge{background:#fee4e2;color:#b42318;}
    .year-badge{background:#ecf2ff;color:#1d4ed8;}
    .filter-btn{border:none;background:#edf2f7;color:#1d3557;padding:8px 12px;border-radius:10px;cursor:pointer;}
    .filter-btn.active{background:#1d3557;color:#fff;}
    .post{border-top:1px solid #eee;padding:14px 0;}
    .post:first-child{border-top:none;}
    .tag{display:inline-block;background:#e8eef8;padding:4px 8px;border-radius:999px;font-size:12px;margin-right:6px;margin-bottom:6px;}
    .attachment-image{width:100%;max-width:360px;border-radius:12px;border:1px solid #ddd;display:block;margin:8px 0;}
    .section-box{border:1px solid #dbe2ea;border-radius:12px;background:#fafcff;padding:14px;margin-bottom:14px;}
    .attach-manage-item{display:flex;justify-content:space-between;gap:8px;align-items:center;border:1px solid #e5e7eb;border-radius:10px;padding:8px 10px;margin-bottom:8px;}
    .attach-actions{display:flex;gap:8px;flex-wrap:wrap;}
    .term-note{color:#1d4ed8;cursor:pointer;text-decoration:underline dotted;font-weight:600;}
    .term-popup{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:9999;}
    .term-popup-box{background:#fff;width:min(520px,92vw);border-radius:16px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,.2);}
    .detail-actions{display:flex;gap:10px;flex-wrap:wrap;}
    .comment-box{border-top:1px solid #eee;padding-top:14px;margin-top:16px;}
    .comment-item{border-top:1px solid #eee;padding:10px 0;}
    .photo-limit-note{font-size:13px;color:#667085;margin:8px 0 12px 0;}
    .member-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .member-item{border:1px solid #e5e7eb;border-radius:12px;padding:12px;margin-bottom:10px;background:#fff;}
    .warn-box{background:#fff8e6;border:1px solid #f0d38a;color:#7a5b00;padding:12px 14px;border-radius:12px;margin-bottom:14px;}
    @media (max-width:1100px){.topbar{flex-wrap:wrap;align-items:stretch;}.brand{width:100%;}.side-nav{width:100%;grid-template-columns:repeat(5,minmax(0,1fr));}.profile-wrap{width:100%;min-width:0;}}
    @media (max-width:900px){.member-grid{grid-template-columns:1fr;}}
    @media (max-width:768px){.side-nav{grid-template-columns:repeat(3,minmax(0,1fr));}.hero-slider,.intro-slider{height:300px;}.hero-text{left:18px;right:18px;bottom:22px;}.hero-text h2{font-size:24px;}.hero-text p{font-size:14px;}.big-title{font-size:22px;}}
    @media (max-width:520px){.side-nav{grid-template-columns:repeat(2,minmax(0,1fr));}.nav-text small{display:none;}}
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar" id="topbar">
      <div class="brand">
        <h1>🔬 IRHOS</h1>
        <p>실험과 탐구로 성장하는 학생 과학 동아리</p>
      </div>
      <div class="side-nav" id="sideNav">
        <button data-page="home"><span class="nav-icon">🏠</span><span class="nav-text">홈 <small>메인 화면</small></span></button>
        <button id="introNavBtn" data-page="intro"><span class="nav-icon">👥</span><span class="nav-text">동아리 소개 <small>소개글 · 슬라이드</small></span></button>
        <button data-page="notice"><span class="nav-icon">📢</span><span class="nav-text">공지 <small>중요 안내</small></span></button>
        <button data-page="archive"><span class="nav-icon">🧪</span><span class="nav-text">탐구 아카이브 <small>실험 · 프로젝트</small></span></button>
        <button data-page="write"><span class="nav-icon">✍️</span><span class="nav-text">글 작성 <small>새 글 등록</small></span></button>
      </div>
      <div class="profile-wrap">
        <div class="profile-menu" id="profileMenu">
          <button id="loginBtn">로그인</button>
          <button id="logoutBtn">로그아웃</button>
          <button id="myPostsBtn">내 글 관리</button>
          <button id="adminMenuBtn" class="hidden">관리자 페이지</button>
        </div>
        <div class="profile-summary" id="profileSummary">
          <div class="profile-left">
            <div class="profile-avatar" id="profileAvatar">G</div>
            <div>
              <div class="profile-name" id="profileName">게스트</div>
              <div class="profile-role" id="profileRole">로그인 안 됨</div>
            </div>
          </div>
          <div>▾</div>
        </div>
      </div>
    </header>

    <main class="main">
      <section id="page-home" class="page active"><div class="card"><p>이 캔버스는 예전 UI 복원용 시작 파일입니다. 요청하신 기준 UI 골격은 복원해 두었습니다. 다음 단계에서 현재 파이어베이스 기능을 이 구조에 맞춰 이어서 붙일 수 있습니다.</p></div></section>
      <section id="page-intro" class="page"><div class="card"><h2>동아리 소개</h2></div></section>
      <section id="page-notice" class="page"><div class="card"><h2>공지</h2></div></section>
      <section id="page-archive" class="page"><div class="card"><h2>탐구 아카이브</h2></div></section>
      <section id="page-write" class="page"><div class="card"><h2>글 작성</h2></div></section>
      <section id="page-myPosts" class="page"><div class="card"><h2>내 글 관리</h2></div></section>
      <section id="page-admin" class="page"><div class="card"><h2>관리자 페이지</h2></div></section>
      <section id="page-detail" class="page"><div class="card"><h2>상세 보기</h2></div></section>
    </main>
  </div>
  <script>
    document.querySelectorAll('#sideNav button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        const target = document.getElementById(`page-${btn.dataset.page}`);
        if (target) target.classList.add('active');
        document.querySelectorAll('#sideNav button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
    const profileSummary = document.getElementById('profileSummary');
    const profileMenu = document.getElementById('profileMenu');
    profileSummary?.addEventListener('click', () => profileMenu.classList.toggle('open'));
    window.addEventListener('scroll', () => {
      const topbar = document.getElementById('topbar');
      if (!topbar) return;
      if (window.scrollY > 140) topbar.classList.add('shrink');
      else if (window.scrollY < 70) topbar.classList.remove('shrink');
    });
  </script>
</body>
</html>
