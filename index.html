<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>IRHOS Science Lab</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#020617;
padding:20px;
font-size:28px;
text-align:center;
}

.container{
padding:30px;
max-width:1000px;
margin:auto;
}

input,textarea,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:none;
}

button{
padding:10px 20px;
background:#3b82f6;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.card{
background:#1e293b;
padding:20px;
margin-top:20px;
border-radius:10px;
}

img{
max-width:200px;
margin-top:10px;
}

</style>
</head>


<body>

<header>
🔬 IRHOS Science Lab
</header>


<div class="container">

<div id="loginBox">

<h2>연구원 로그인</h2>

<input id="studentId" placeholder="학번">
<input id="name" placeholder="이름">

<button onclick="login()">로그인</button>

</div>


<div id="main" style="display:none;">

<h2>탐구 작성</h2>

<input id="title" placeholder="탐구 제목">

<select id="year">
<option>2026</option>
<option>2025</option>
<option>2024</option>
</select>

<textarea id="content" placeholder="탐구 내용"></textarea>

<input id="fileLink" placeholder="PDF / 워드 / 한글 링크">

<textarea id="feedback" placeholder="선생님 피드백"></textarea>

<input type="file" id="photo">

<button onclick="saveResearch()">저장</button>

<hr>

<h2>탐구 검색</h2>

<input id="search" placeholder="검색어 입력" onkeyup="searchResearch()">

<div id="researchList"></div>

</div>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyDXVVSPhvErz9JfjXKjMaZIBNYu6d3j8dg",
  authDomain: "irhos-science-lab.firebaseapp.com",
  projectId: "irhos-science-lab",
  storageBucket: "irhos-science-lab.firebasestorage.app",
  messagingSenderId: "54955251430",
  appId: "1:54955251430:web:5396c836ccc33f981d4d27",
  measurementId: "G-378MZ34JSE"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);



window.login = function(){

let id = document.getElementById("studentId").value
let name = document.getElementById("name").value

if(id=="" || name==""){
alert("학번과 이름 입력")
return
}

localStorage.setItem("user", JSON.stringify({id,name}))

showMain()

}



function showMain(){

document.getElementById("loginBox").style.display="none"
document.getElementById("main").style.display="block"

loadResearch()

}



if(localStorage.getItem("user")){
showMain()
}



window.saveResearch = async function(){

let title = document.getElementById("title").value
let content = document.getElementById("content").value
let year = document.getElementById("year").value
let fileLink = document.getElementById("fileLink").value
let feedback = document.getElementById("feedback").value

let photoInput = document.getElementById("photo")

let photoData = ""

if(photoInput.files[0]){

let reader = new FileReader()

reader.onload = async function(){

photoData = reader.result

await addDoc(collection(db,"research"),{
title,
content,
year,
fileLink,
feedback,
photo:photoData
})

alert("저장 완료")

loadResearch()

}

reader.readAsDataURL(photoInput.files[0])

}else{

await addDoc(collection(db,"research"),{
title,
content,
year,
fileLink,
feedback,
photo:""
})

alert("저장 완료")

loadResearch()

}

}



async function loadResearch(){

let list = document.getElementById("researchList")

list.innerHTML=""

let querySnapshot = await getDocs(collection(db,"research"))

querySnapshot.forEach((doc)=>{

let d = doc.data()

list.innerHTML += `

<div class="card">

<h3>${d.title}</h3>

<p>연도 : ${d.year}</p>

<p>${d.content}</p>

<a href="${d.fileLink}" target="_blank">보고서 보기</a>

<p>피드백 : ${d.feedback}</p>

${d.photo ? `<img src="${d.photo}">` : ""}

</div>

`

})

}



window.searchResearch = function(){

let keyword = document.getElementById("search").value.toLowerCase()

let cards = document.querySelectorAll(".card")

cards.forEach(c=>{

if(c.innerText.toLowerCase().includes(keyword)){

c.style.display="block"

}else{

c.style.display="none"

}

})

}



</script>

</body>
</html>
