<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>탐구 아카이브</title>

<style>

body{
margin:0;
font-family: "Noto Sans KR", sans-serif;
background:#f4fbff;
color:#222;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* 로그인 */

#loginBox{
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
text-align:center;
width:90%;
max-width:350px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#7fd3ff;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#5fc4ff;
}

/* 홈페이지 */

#mainPage{
display:none;
width:100%;
height:100vh;
flex-direction:column;
}

header{
background:#000;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

nav{
background:#eaf7ff;
padding:10px;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

nav a{
text-decoration:none;
color:#000;
font-weight:bold;
}

.container{
padding:20px;
text-align:center;
}

.card{
background:white;
padding:20px;
margin:15px auto;
border-radius:12px;
max-width:500px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* 모바일 대응 */

@media (max-width:600px){

header{
font-size:18px;
}

nav{
gap:10px;
}

.card{
margin:10px;
}

}

</style>
</head>


<body>

<!-- 로그인 화면 -->

<div id="loginBox">

<h2>🔬 탐구 아카이브 로그인</h2>

<input type="text" id="id" placeholder="아이디 입력">

<input type="password" id="pw" placeholder="비밀번호 입력">

<button onclick="login()">로그인</button>

<p id="error" style="color:red;"></p>

</div>



<!-- 메인 페이지 -->

<div id="mainPage">

<header>
🔬 탐구 아카이브
</header>

<nav>
<a href="#">🏠 홈</a>
<a href="#">📂 탐구 아카이브</a>
<a href="#">👨‍🔬 동아리 부원 목록</a>
</nav>

<div class="container">

<div class="card">
<h3>🔎 동아리 소개</h3>
<p>우리 동아리는 다양한 과학 탐구 활동을 기록하고 공유하는 공간입니다.</p>
</div>

<div class="card">
<h3>📂 탐구 아카이브</h3>
<p>실험 기록과 연구 자료를 업로드할 수 있습니다.</p>
</div>

<div class="card">
<h3>👨‍🔬 동아리 부원 목록</h3>
<p>
부장 : 김가은<br>
지도교사 : 구자형
</p>
</div>

</div>

</div>



<script>

const users = {
"20602 김가은":"science20602",
"00000 구자형":"teacher00000"
};

function login(){

const id = document.getElementById("id").value;
const pw = document.getElementById("pw").value;

if(users[id] && users[id] === pw){

document.getElementById("loginBox").style.display="none";
document.getElementById("mainPage").style.display="flex";

}else{

document.getElementById("error").innerText="아이디 또는 비밀번호가 틀렸습니다.";

}

}

</script>

</body>
</html>
