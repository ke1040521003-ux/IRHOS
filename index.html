<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IRHOS 융합과학탐구동아리</title>

<style>

body{
font-family:Arial;
margin:0;
background:#eef6fb;
}

header{
background:#000;
color:white;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav{
background:#d9efff;
padding:10px;
text-align:center;
}

nav button{
margin:5px;
padding:8px 15px;
border:none;
background:white;
border-radius:10px;
cursor:pointer;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.post{
border-top:1px solid #ddd;
padding:15px 0;
}

button{
padding:6px 12px;
border:none;
background:#3ea6ff;
color:white;
border-radius:6px;
cursor:pointer;
}

img{
max-width:200px;
margin:5px;
border-radius:8px;
}

</style>
</head>

<body>

<header>
<h2>🔬 IRHOS 융합과학탐구동아리</h2>

<button onclick="toggleLogin()">로그인</button>

</header>

<nav>

<button onclick="showSection('home')">메인</button>
<button onclick="showSection('archive')">탐구 아카이브</button>
<button onclick="showSection('write')">탐구 작성</button>

</nav>


<div class="container">

<div id="home" class="card">
<h3>최근 탐구</h3>
<div id="homePreview"></div>
</div>


<div id="archive" class="card hidden">

<h3>탐구 아카이브</h3>

<input id="searchInput" placeholder="검색" onkeyup="searchResearch()">

<select id="yearFilter" onchange="loadResearch()">
<option value="">전체</option>
<option>2026</option>
<option>2025</option>
<option>2024</option>
</select>

<div id="researchList"></div>

</div>


<div id="write" class="card hidden">

<h3>탐구 작성</h3>

<input id="title" placeholder="제목">

<select id="year">
<option>2026</option>
<option>2025</option>
<option>2024</option>
</select>

<textarea id="content" placeholder="내용"></textarea>

<input id="fileLink" placeholder="PDF / Word / 한글 링크">

<input type="file" id="photo" multiple>

<label>
<input type="checkbox" id="featured">
대표 탐구
</label>

<button onclick="saveResearch()">저장</button>

</div>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyDXVVSPhvErz9JfjXKjMaZIBNYu6d3j8dg",
authDomain: "irhos-science-lab.firebaseapp.com",
projectId: "irhos-science-lab",
storageBucket: "irhos-science-lab.firebasestorage.app",
messagingSenderId: "54955251430",
appId: "1:54955251430:web:5396c836ccc33f981d4d27"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


function getUser(){
return JSON.parse(localStorage.getItem("user") || "null");
}

function isLeader(){
let u=getUser();
return u && u.id==="20602";
}

function isTeacher(){
let u=getUser();
return u && u.id==="00000";
}



window.showSection=function(id){

["home","archive","write"].forEach(s=>{
document.getElementById(s).classList.add("hidden");
});

document.getElementById(id).classList.remove("hidden");

}



window.toggleLogin=function(){

let id=prompt("학번 입력");

let name=prompt("이름 입력");

if(
(id==="20602" && name==="김가은") ||
(id==="00000" && name==="구자형")
){

localStorage.setItem("user",JSON.stringify({id,name}));

alert("로그인 성공");

}else{

alert("계정 없음");

}

}



window.saveResearch=async function(){

if(!isLeader()){
alert("부장만 작성 가능");
return;
}

let title=document.getElementById("title").value;
let content=document.getElementById("content").value;
let year=document.getElementById("year").value;
let fileLink=document.getElementById("fileLink").value;
let featured=document.getElementById("featured").checked;

let photoInput=document.getElementById("photo");

let photos=[];

for(let file of photoInput.files){

let reader=new FileReader();

await new Promise(resolve=>{

reader.onload=()=>{
photos.push(reader.result);
resolve();
};

reader.readAsDataURL(file);

});

}

await addDoc(collection(db,"research"),{

title,
content,
year,
fileLink,
photos,
featured,
views:0,
viewUsers:[],
teacherFeedback:"",
author:getUser().name,
createdAt:new Date().toISOString()

});

alert("저장 완료");

loadResearch();

}



async function loadResearch(){

let list=document.getElementById("researchList");

list.innerHTML="";

let snapshot=await getDocs(collection(db,"research"));

let posts=[];

snapshot.forEach(doc=>{

posts.push({
id:doc.id,
...doc.data()
});

});

let filter=document.getElementById("yearFilter").value;

if(filter){
posts=posts.filter(p=>p.year===filter);
}

posts.sort((a,b)=>b.createdAt.localeCompare(a.createdAt));

for(let p of posts){

list.innerHTML+=`

<div class="post">

<h3>${p.featured?"⭐":""} ${p.title}</h3>

<p>${p.content}</p>

<p>연도 : ${p.year}</p>

<p>조회수 : ${p.views}</p>

<p>조회자 : ${p.viewUsers.join(", ")}</p>

${p.fileLink?`<a href="${p.fileLink}" target="_blank">보고서</a>`:""}

<div>
${p.photos.map(img=>`<img src="${img}">`).join("")}
</div>

${p.teacherFeedback?`<p>💬 선생님 피드백 : ${p.teacherFeedback}</p>`:""}

${isTeacher()?`

<textarea id="feedback-${p.id}" placeholder="피드백"></textarea>
<button onclick="saveFeedback('${p.id}')">피드백 저장</button>

`:""}

${getUser() && p.author===getUser().name?`

<button onclick="deleteResearch('${p.id}')">삭제</button>

`:""}

</div>

`;

}

}



window.saveFeedback=async function(id){

if(!isTeacher()) return;

let text=document.getElementById("feedback-"+id).value;

let ref=doc(db,"research",id);

await updateDoc(ref,{
teacherFeedback:text
});

alert("피드백 저장");

loadResearch();

}



window.deleteResearch=async function(id){

if(!confirm("삭제할까?")) return;

await deleteDoc(doc(db,"research",id));

alert("삭제됨");

loadResearch();

}



window.searchResearch=function(){

let keyword=document.getElementById("searchInput").value.toLowerCase();

let posts=document.querySelectorAll(".post");

posts.forEach(p=>{

p.style.display=p.innerText.toLowerCase().includes(keyword)
?"block":"none";

});

}



loadResearch();

</script>

</body>
</html>
